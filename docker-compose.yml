services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nutrisuggest_db
      POSTGRES_USER: nutri_user
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    env_file: ./backend/.env

  celery:
    build: ./backend
    command: celery -A app.workers.celery_app worker
    depends_on: [postgres, redis]
    env_file: ./backend/.env

  # frontend:
  #   build: ./frontend
  #   ports: ["3000:3000"]
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
